<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>我们认识了多久</title>

  <link rel="icon" href="image/logo.png" type="image/png">

  <!-- Apple 设备的 Touch Icon -->
  <link rel="apple-touch-icon" href="image/logo.png" sizes="1024x1024">

  <!-- Android 设备 & PWA 图标 -->
  <link rel="icon" href="image/logo.png" sizes="1024x1024" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.2/lunar.min.js" defer></script>

  <style>
    :root{--transition-duration:.4s;--transition-easing:ease-in-out;}
    body{
      margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:'Nunito',-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
      background:url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1350&q=80')
            no-repeat center/cover fixed;
      overflow:hidden;
    }

    /* --- 加载覆盖层样式 --- */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
    }

    #loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-top: 4px solid #111;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 1.2em;
      color: #111;
      font-weight: 700;
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    .glass{
      background:rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      padding:50px 60px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.25);color:#111;text-align:center;
      opacity: 0;
      visibility: hidden;
    }

    .glass.is-loaded {
        opacity: 1;
        visibility: visible;
        animation: slideInFade 1s cubic-bezier(.22,1,.36,1) forwards;
    }

    @keyframes slideInFade{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
    .content-wrapper{transition:opacity var(--transition-duration) var(--transition-easing);}
    .content-wrapper.is-transitioning{opacity:0;}

    /* --- 核心修改：优化标题H1的样式 --- */
    h1 {
      font-size: 1.5em;
      font-weight: 400;
      margin: 0 auto 40px; /* 使用auto外边距辅助居中 */
      max-width: 90%; /* 限制最大宽度，给左右留出空间 */
      min-height: 3em; /* 【修改】使用min-height代替height，允许容器高度根据内容扩展 */
      display: flex;
      flex-wrap: wrap; /* 【新增】允许flex项目优雅地换行 */
      justify-content: center;
      align-items: center;
      line-height: 1.4;
    }

    .title-segment{display:inline-block;transition:filter .5s,opacity .5s,transform .3s;}
    .glass.is-focused .title-segment:not(.is-active){filter:blur(4px);}
    .glass.is-focused .title-segment.is-active .name{transform:scale(1.15);}
    .name{font-weight:700;cursor:pointer;display:inline-block;transition:transform .3s;}
    .back-button{font-size:.8em;color:#333;cursor:pointer;font-weight:700;margin-left:8px;}
    .back-button:hover{text-decoration:underline;}

    .time-row{display:flex;justify-content:center;align-items:baseline;gap:2.5rem;font-size:4rem;font-weight:700;line-height:1;transition:filter .5s;}
    .glass.is-focused .time-row{filter:blur(4px);}
    .time-unit{display:flex;align-items:baseline;gap:.5rem;}
    .digit-group{display:flex;}
    .digit-container{width:1em;height:1.5em;overflow:hidden;position:relative;}
    .digit-list{display:flex;flex-direction:column;transition:transform .8s cubic-bezier(.68,-.55,.27,1.55);}
    .digit-list div{height:1.5em;text-align:center;line-height:1.5em;}
    .unit-label{font-size:.3em;font-weight:400;text-transform:uppercase;}

    /* 页脚样式 */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: rgba(51, 51, 51, 0.7);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }
    footer #hitokoto_text {
      margin-bottom: 5px;
    }

    /* 移动端适配 */
    @media(max-width:768px){
      .glass {
        padding: 30px 25px;
        margin: 15px;
      }
      
      /* --- 核心修改：优化移动端标题字体与行高 --- */
      h1 {
        font-size: 1.15em; /* 微调字体大小以适应小屏幕 */
        margin-bottom: 25px;
        line-height: 1.5; /* 调整行高，使换行后更美观 */
        max-width: 100%; /* 在卡片内占满可用宽度 */
      }
      
      .time-row {
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        font-size: 2.5rem;
      }
      footer {
        padding: 15px 10px;
        font-size: 13px;
        line-height: 1.6;
      }
      footer p {
          margin: 0 15px;
      }
      footer #hitokoto_text {
          margin-bottom: 8px;
      }
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="loader"></div>
    <p class="loading-text">加载中...</p>
  </div>
  
  <div class="glass">
    <div class="content-wrapper">
      <h1 id="main-title"></h1>
      <div class="time-row">
        <div class="time-unit"><div id="days"    class="digit-group"></div><span class="unit-label">天</span></div>
        <div class="time-unit"><div id="hours"   class="digit-group"></div><span class="unit-label">小时</span></div>
        <div class="time-unit"><div id="minutes" class="digit-group"></div><span class="unit-label">分钟</span></div>
        <div class="time-unit"><div id="seconds" class="digit-group"></div><span class="unit-label">秒</span></div>
      </div>
    </div>
  </div>

<script>
/* ------------ 1. 统一网络时间 ------------ */
let networkNow=null, startLocal=Date.now();
async function initTime(){
  try{
    const ctrl=new AbortController();const timeout=setTimeout(()=>ctrl.abort(),3000);
    const res=await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Shanghai',{signal:ctrl.signal});
    clearTimeout(timeout);
    if(!res.ok)throw'netErr';
    const j=await res.json();
    networkNow=new Date(j.year,j.month-1,j.day,j.hour,j.minute,j.seconds,j.milliSeconds);
  }catch(e){
    networkNow=new Date();            // 回退本地
  }
}
function now(){return new Date(networkNow.getTime()+Date.now()-startLocal);}

/* ------------ 2. 生日配置 ------------ */
const birthdays={ 
  mikasa:{name:'Mikasa',month:3,day:18,isLunar:true},
  linlin:{name:'琳琳',  month:6,day:19,isLunar:true}
};

/* ------------ 3. 数字滚动组件 ------------ */
function createScroller(){
  const c=document.createElement('div');c.className='digit-container';
  const l=document.createElement('div');l.className='digit-list';
  for(let i=0;i<=9;i++){const d=document.createElement('div');d.textContent=i;l.appendChild(d);}
  c.appendChild(l);return c;
}
function updateGroup(id,val){
  const g=document.getElementById(id);if(!g)return;
  const s=(id==='days')?String(val):String(val).padStart(2,'0');
  if(g.dataset.value===s)return;g.dataset.value=s;
  while(g.children.length<s.length)g.appendChild(createScroller());
  while(g.children.length>s.length)g.removeChild(g.firstChild);
  [...s].forEach((ch,i)=>{g.children[i].querySelector('.digit-list')
    .style.transform=`translateY(-${parseInt(ch)*1.5}em)`;});
}

/* ------------ 4. 下一次生日核心算法 ------------ */
function getNextBirthday(p){
  const today=now();

  /* ---- 阳历 ---- */
  if(!p.isLunar){
    let y=today.getFullYear(),d=new Date(y,p.month-1,p.day),passedAll=false;
    if(d<today){passedAll=true;d=new Date(++y,p.month-1,p.day);}
    return{date:d,double:false,label:'',passedFirst:false,passedAll};
  }

  /* ---- 农历 ---- */
  const solar=(y,isLeap)=>{const l=Lunar.fromYmd(y,p.month,p.day,isLeap);
    const s=l.getSolar();return new Date(s.getYear(),s.getMonth()-1,s.getDay());};

  const buildYear=y=>{
    const leap=LunarYear.fromYear(y).getLeapMonth();
    const arr=[{d:solar(y,false),type:'正常月'}];
    if(leap===p.month)arr.push({d:solar(y,true),type:'闰月'});
    return{arr,hasLeap:leap===p.month};
  };

  let y=today.getFullYear(),{arr,hasLeap}=buildYear(y);

  /* 今年所有生日都过完 -> 跳到下一年 */
  if(arr.every(i=>i.d<today)){
    y++;({arr,hasLeap}=buildYear(y));
    return{
      date:arr[0].d,double:hasLeap,label:hasLeap?arr[0].type:'',
      passedFirst:false,passedAll:true
    };
  }

  /* 今年至少还有一个生日未过 */
  const target=arr.find(i=>i.d>=today);
  const passedFirst=hasLeap && arr[0].d<today;
  return{
    date:target.d,double:hasLeap,label:hasLeap?target.type:'',
    passedFirst,passedAll:false
  };
}

/* ------------ 5. 全局状态 & 渲染 ------------ */
let mode='',targetDate=null,timer=null;
const glass=document.querySelector('.glass');
const wrap=document.querySelector('.content-wrapper');
const title=document.getElementById('main-title');

function tick(){
  if(!targetDate)return;
  const diff=(mode==='together')?(now()-targetDate):(targetDate-now());
  const s=Math.max(0,Math.floor(diff/1000));
  updateGroup('days',Math.floor(s/86400));
  updateGroup('hours',Math.floor((s%86400)/3600));
  updateGroup('minutes',Math.floor((s%3600)/60));
  updateGroup('seconds',s%60);
}

function setMode(m){
  if(mode===m&&m!=='')return;mode=m;
  wrap.classList.add('is-transitioning');glass.classList.remove('is-focused');

  setTimeout(()=>{
    let html='';
    if(m==='together'){
      targetDate=new Date('2025-06-07T02:21:00');
      html=`<span class="title-segment name-wrapper" id="w-mikasa"><span class="name">Mikasa</span></span>
            <span class="title-segment">&nbsp;和&nbsp;</span>
            <span class="title-segment name-wrapper" id="w-linlin"><span class="name">琳琳</span></span>
            <span class="title-segment">&nbsp;已经认识了</span>`;
    }else{
      const info=birthdays[m];
      const b=getNextBirthday(info);targetDate=b.date;

      /* —— 提示段 —— */
      if(b.double)        html+=`<span class="title-segment">今年你有两个生日哦～</span>`;
      if(b.passedFirst)   html+=`<span class="title-segment">第一个生日已经过啦～</span>`;
      if(b.passedAll)     html+=`<span class="title-segment">今年生日已经过啦～</span>`;

      /* —— 主体段 —— */
      const labelTxt=b.label?`${b.label}生日`:'生日';
      html+=`<span class="title-segment">距离&nbsp;</span>
              <span class="title-segment name-wrapper" id="w-${m}">
                <span class="name">${info.name}</span></span>
              <span class="title-segment">&nbsp;的${labelTxt}还有</span>
              <span class="title-segment"><span class="back-button">(返回)</span></span>`;
    }

    title.innerHTML=html;
    if(timer)clearInterval(timer);
    tick();timer=setInterval(tick,1000);
    bindEvents();wrap.classList.remove('is-transitioning');
  },400);
}

function bindEvents(){
  const touch=('ontouchstart'in window)||navigator.maxTouchPoints>0;
  const m=document.getElementById('w-mikasa');
  const l=document.getElementById('w-linlin');
  const back=document.querySelector('.back-button');

  if(m)m.onclick=()=>setMode('mikasa');
  if(l)l.onclick=()=>setMode('linlin');
  if(back)back.onclick=()=>setMode('together');

  if(!touch&&mode==='together'){
    [m,l].forEach(el=>{
      if(!el)return;
      el.onmouseenter=()=>{glass.classList.add('is-focused');el.classList.add('is-active');};
      el.onmouseleave=()=>{glass.classList.remove('is-focused');el.classList.remove('is-active');};
    });
  }
}

/* ------------ 6. 启动 ------------ */
window.addEventListener('DOMContentLoaded', async () => {
    const loadingOverlay = document.getElementById('loading-overlay');
    const glassCard = document.querySelector('.glass');

    await initTime();
    startLocal = Date.now(); 

    loadingOverlay.classList.add('hidden');
    glassCard.classList.add('is-loaded');

    setMode('together');
    
    // 每日一言
    fetch('https://v1.hitokoto.cn?c=i')
      .then(response => response.json())
      .then(data => {
        const hitokoto = document.getElementById('hitokoto_text');
        hitokoto.innerText = `“${data.hitokoto}”`;
        const from = document.createElement('p');
        from.textContent = `— ${data.from_who || ''}《${data.from}》`;
        hitokoto.parentNode.insertBefore(from, hitokoto.nextSibling);
      })
      .catch(console.error)
});
</script>

<footer>
  <p id="hitokoto_text">正在获取今日一言...</p>
  <p>&copy; 2025 By Mikasa & Linlin. All Rights Reserved.</p>
  </footer>

</body>
</html>
